<!DOCTYPE html>
<html>
    <head>
        <title>my sports</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <h2>my top favorate sports</h2>
            <div class="carousel slide" id="carouselExampleCaptions" data-ride="carousel">
                <!-- indicators -->
                   <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                     <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    </div>
                 <!-- warpper for slides -->
                  <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img class="d-block w-100" src="https://tse4.mm.bing.net/th/id/OIP.X6trV_mEslA0cuf7WJFimwHaEK?pid=Api&h=220&P=0" alt="RONALDO">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://tse3.mm.bing.net/th/id/OIP.7LgZ6-vYLapFFQoKqmFaEAHaGY?pid=Api&h=220&P=0" alt="RONALDOING">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://tse1.mm.bing.net/th/id/OIP.xKyMO9qrIPSu7dfmIxtLwgHaEJ?pid=Api&h=220&P=0" alt="">
                    </div>
                </div>
                <!-- left and right controls -->
                 <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
            </div>
        </div>
    </body>
</html>
